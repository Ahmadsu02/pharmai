<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PharmAI — المساعد الصيدلاني الذكي</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap');

    :root {
      --primary: #0ea5e9;
      --primary-dark: #0284c7;
      --primary-glow: rgba(14,165,233,0.25);
      --bg: #0f172a;
      --bg2: #1e293b;
      --bg3: #334155;
      --surface: #1e293b;
      --border: rgba(255,255,255,0.07);
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --green: #10b981;
      --green-bg: rgba(16,185,129,0.12);
      --user-bubble: linear-gradient(135deg, #0ea5e9, #0284c7);
      --ai-bubble: #1e293b;
      --radius: 18px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Tajawal', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── HEADER ── */
    header {
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%);
      border-bottom: 1px solid var(--border);
      padding: 14px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }

    header::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -10%;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(14,165,233,0.15) 0%, transparent 70%);
      pointer-events: none;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, #0ea5e9, #10b981);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      box-shadow: 0 0 20px rgba(14,165,233,0.4);
      animation: pulse-icon 3s ease-in-out infinite;
    }

    @keyframes pulse-icon {
      0%, 100% { box-shadow: 0 0 20px rgba(14,165,233,0.4); }
      50% { box-shadow: 0 0 35px rgba(14,165,233,0.7); }
    }

    .logo-text h1 {
      font-size: 1.25rem;
      font-weight: 800;
      background: linear-gradient(90deg, #fff, #94d2f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo-text span {
      font-size: 0.78rem;
      color: var(--text-muted);
      font-weight: 400;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 7px;
      background: var(--green-bg);
      border: 1px solid rgba(16,185,129,0.3);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 0.8rem;
      color: var(--green);
      font-weight: 500;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      background: var(--green);
      border-radius: 50%;
      animation: blink 2s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ── CHAT AREA ── */
    #chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 28px 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }

    #chat-area::-webkit-scrollbar { width: 5px; }
    #chat-area::-webkit-scrollbar-track { background: transparent; }
    #chat-area::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 10px; }

    /* ── WELCOME ── */
    .welcome {
      text-align: center;
      padding: 48px 20px;
      animation: fadeInUp 0.6s ease;
    }

    .welcome-icon {
      font-size: 3.5rem;
      margin-bottom: 16px;
      display: block;
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .welcome h2 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 10px;
      background: linear-gradient(90deg, #f1f5f9, #94d2f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .welcome p {
      color: var(--text-muted);
      font-size: 0.95rem;
      line-height: 1.7;
      max-width: 420px;
      margin: 0 auto 28px;
    }

    .quick-btns {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }

    .quick-btn {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 9px 18px;
      font-size: 0.85rem;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.25s ease;
      font-family: 'Tajawal', sans-serif;
    }

    .quick-btn:hover {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px var(--primary-glow);
    }

    /* ── MESSAGES ── */
    .msg {
      display: flex;
      gap: 12px;
      align-items: flex-end;
      animation: fadeInUp 0.35s ease;
      max-width: 780px;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.user { flex-direction: row-reverse; margin-right: auto; margin-left: 0; align-self: flex-end; }
    .msg.ai   { align-self: flex-start; }

    .msg-avatar {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
    }

    .msg.user .msg-avatar { background: linear-gradient(135deg, #0ea5e9, #0284c7); }
    .msg.ai   .msg-avatar { background: linear-gradient(135deg, #10b981, #059669); }

    .msg-bubble {
      padding: 14px 18px;
      border-radius: var(--radius);
      font-size: 0.95rem;
      line-height: 1.75;
      max-width: 640px;
      word-break: break-word;
    }

    .msg.user .msg-bubble {
      background: var(--user-bubble);
      color: white;
      border-bottom-left-radius: 6px;
      box-shadow: 0 4px 20px rgba(14,165,233,0.3);
    }

    .msg.ai .msg-bubble {
      background: var(--ai-bubble);
      color: var(--text);
      border: 1px solid var(--border);
      border-bottom-right-radius: 6px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    }

    .msg.ai .msg-bubble strong { color: #7dd3fc; }

    .msg-time {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 5px;
      padding: 0 4px;
    }

    .msg-meta { display: flex; flex-direction: column; }
    .msg.user .msg-meta { align-items: flex-end; }

    /* source badge */
    .source-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(16,185,129,0.12);
      border: 1px solid rgba(16,185,129,0.25);
      border-radius: 10px;
      padding: 3px 10px;
      font-size: 0.72rem;
      color: var(--green);
      margin-top: 7px;
    }

    /* ── TYPING ── */
    .typing-indicator {
      display: flex;
      gap: 12px;
      align-items: flex-end;
      animation: fadeInUp 0.3s ease;
    }

    .typing-bubble {
      background: var(--ai-bubble);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      border-bottom-right-radius: 6px;
      padding: 16px 20px;
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .typing-dot {
      width: 8px;
      height: 8px;
      background: var(--primary);
      border-radius: 50%;
      animation: typing-bounce 1.3s ease-in-out infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing-bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-8px); opacity: 1; }
    }

    /* ── INPUT ── */
    .input-area {
      background: var(--bg2);
      border-top: 1px solid var(--border);
      padding: 16px 20px 20px;
      flex-shrink: 0;
    }

    .input-wrapper {
      max-width: 820px;
      margin: 0 auto;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--bg3);
      border: 1.5px solid var(--border);
      border-radius: 16px;
      padding: 10px 14px;
      transition: border-color 0.25s ease, box-shadow 0.25s ease;
    }

    .input-wrapper:focus-within {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-glow);
    }

    #msg-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'Tajawal', sans-serif;
      font-size: 0.97rem;
      resize: none;
      max-height: 120px;
      line-height: 1.6;
      padding: 4px 0;
    }

    #msg-input::placeholder { color: var(--text-muted); }

    #send-btn {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #0ea5e9, #0284c7);
      border: none;
      border-radius: 11px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      flex-shrink: 0;
    }

    #send-btn:hover { transform: scale(1.08); box-shadow: 0 4px 16px var(--primary-glow); }
    #send-btn:active { transform: scale(0.95); }
    #send-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    #send-btn svg { width: 18px; height: 18px; fill: white; }

    .input-hint {
      text-align: center;
      font-size: 0.73rem;
      color: var(--text-muted);
      margin-top: 10px;
    }

    /* ── MARKDOWN ── */
    .msg-bubble p { margin-bottom: 8px; }
    .msg-bubble p:last-child { margin-bottom: 0; }
    .msg-bubble ul, .msg-bubble ol { padding-right: 20px; margin: 8px 0; }
    .msg-bubble li { margin-bottom: 4px; }

    /* ── DISCLAIMER BAR ── */
    .disclaimer {
      background: rgba(234,179,8,0.08);
      border-top: 1px solid rgba(234,179,8,0.2);
      padding: 6px 20px;
      text-align: center;
      font-size: 0.73rem;
      color: #ca8a04;
      flex-shrink: 0;
    }

    /* ── SEVERITY BADGES ── */
    .msg-bubble .sev-high   { color: #f87171; font-weight: 700; }
    .msg-bubble .sev-medium { color: #fbbf24; font-weight: 700; }
    .msg-bubble .sev-info   { color: #60a5fa; }

    /* ── SOURCES ROW ── */
    .sources-row {
      display: flex; gap: 6px; flex-wrap: wrap; margin-top: 7px;
    }

    .source-badge.fda {
      background: rgba(14,165,233,0.1);
      border-color: rgba(14,165,233,0.25);
      color: #7dd3fc;
    }

  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">💊</div>
    <div class="logo-text">
      <h1>PharmAI</h1>
      <span>المساعد الصيدلاني الذكي</span>
    </div>
  </div>
  <div class="status-badge">
    <div class="status-dot"></div>
    متصل
  </div>
</header>

<div id="chat-area">
  <div class="welcome" id="welcome">
    <span class="welcome-icon">🧬</span>
    <h2>مرحباً بك في PharmAI</h2>
    <p>اسألني عن أي دواء، جرعة، تفاعل دوائي، أو بديل جنيسي — سأجيبك فوراً.</p>
    <div class="quick-btns">
      <button class="quick-btn" onclick="sendQuick('ما هو دواء أموكسيسيلين واستخداماته؟')">💊 أموكسيسيلين</button>
      <button class="quick-btn" onclick="sendQuick('ما الفرق بين أدفيل وبندول؟')">⚖️ أدفيل vs بندول</button>
      <button class="quick-btn" onclick="sendQuick('ما هي بدائل الإيبوبروفين؟')">🔄 بدائل الإيبوبروفين</button>
      <button class="quick-btn" onclick="sendQuick('هل الأموكسيسيلين آمن للحامل؟')">🤰 أدوية الحمل</button>
      <button class="quick-btn" onclick="sendQuick('ما هي أعراض جرعة الباراسيتامول الزائدة؟')">⚠️ جرعة زائدة</button>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-wrapper">
    <textarea
      id="msg-input"
      rows="1"
      placeholder="اكتب سؤالك عن أي دواء..."
    ></textarea>
    <button id="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
      </svg>
    </button>
  </div>
  <div class="input-hint">اضغط Enter للإرسال · Shift+Enter لسطر جديد</div>
</div>

<div class="disclaimer">
  ⚠️ المعلومات للمساعدة المهنية فقط — القرار النهائي يعود للصيدلاني أو الطبيب المختص
</div>

<script>
  const API = window.location.hostname === 'localhost' ? 'http://localhost:8000' : '';

  const chatArea = document.getElementById('chat-area');
  const input    = document.getElementById('msg-input');
  const sendBtn  = document.getElementById('send-btn');
  let isLoading  = false;
  let sessionId  = null;

  // ── Input events ───────────────────────────────────────────────────────────
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  });

  function sendQuick(text) { input.value = text; sendMessage(); }
  function now() { return new Date().toLocaleTimeString('ar', { hour: '2-digit', minute: '2-digit' }); }

  // ── Message renderers ──────────────────────────────────────────────────────
  function appendUserMsg(text) {
    document.getElementById('welcome')?.remove();
    const div = document.createElement('div');
    div.className = 'msg user';
    div.innerHTML = `
      <div class="msg-avatar">👤</div>
      <div class="msg-meta">
        <div class="msg-bubble">${escapeHtml(text)}</div>
        <div class="msg-time">${now()}</div>
      </div>`;
    chatArea.appendChild(div);
    scrollBottom();
  }

  function showTyping() {
    const div = document.createElement('div');
    div.className = 'typing-indicator'; div.id = 'typing';
    div.innerHTML = `
      <div class="msg-avatar" style="background:linear-gradient(135deg,#10b981,#059669)">🤖</div>
      <div class="typing-bubble">
        <div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>
      </div>`;
    chatArea.appendChild(div);
    scrollBottom();
  }

  function removeTyping() { document.getElementById('typing')?.remove(); }

  function appendAiMsg(text, sources, fdaSources) {
    const div = document.createElement('div');
    div.className = 'msg ai';

    let badges = '';
    if (sources > 0)
      badges += `<div class="source-badge">📂 موثق من قاعدة البيانات</div>`;
    if (fdaSources > 0)
      badges += `<div class="source-badge fda">🇺🇸 ${fdaSources} دواء — OpenFDA</div>`;

    const disclaimer = `<div style="font-size:0.72rem;color:#64748b;margin-top:8px;border-top:1px solid rgba(255,255,255,0.05);padding-top:6px">
      ⚠️ للمساعدة المهنية فقط — القرار للصيدلاني/الطبيب</div>`;

    div.innerHTML = `
      <div class="msg-avatar">🤖</div>
      <div class="msg-meta">
        <div class="msg-bubble">${formatText(text)}${disclaimer}</div>
        <div class="sources-row">${badges}</div>
        <div class="msg-time">${now()}</div>
      </div>`;
    chatArea.appendChild(div);
    scrollBottom();
  }

  // ── Send ───────────────────────────────────────────────────────────────────
  async function sendMessage() {
    const text = input.value.trim();
    if (!text || isLoading) return;

    isLoading = true; sendBtn.disabled = true;
    input.value = ''; input.style.height = 'auto';
    appendUserMsg(text);
    showTyping();

    try {
      const res = await fetch(`${API}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, session_id: sessionId }),
      });

      const data = await res.json();
      removeTyping();
      if (data.session_id) sessionId = data.session_id;

      if (data.answer) {
        appendAiMsg(data.answer, data.sources || 0, data.fda_sources || 0);
      } else {
        appendAiMsg('عذراً، لم أتمكن من الإجابة. حاول مرة أخرى.', 0, 0);
      }
    } catch {
      removeTyping();
      appendAiMsg('⚠️ تعذر الاتصال بالسيرفر. تأكد أن السيرفر شغال على المنفذ 8000.', 0, 0);
    }

    isLoading = false; sendBtn.disabled = false; input.focus();
  }

  // ── Helpers ────────────────────────────────────────────────────────────────
  function scrollBottom() {
    setTimeout(() => chatArea.scrollTo({ top: chatArea.scrollHeight, behavior: 'smooth' }), 50);
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function formatText(text) {
    return text
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.*?)\*/g, '<em>$1</em>')
      .replace(/⛔(.*?)(\n|$)/g, '<span class="sev-high">⛔$1</span><br>')
      .replace(/⚠️(.*?)(\n|$)/g, '<span class="sev-medium">⚠️$1</span><br>')
      .replace(/ℹ️(.*?)(\n|$)/g, '<span class="sev-info">ℹ️$1</span><br>')
      .replace(/^(\d+)\.\s/gm, '<br>$1. ')
      .replace(/^[-•]\s/gm, '<br>• ')
      .replace(/\n/g, '<br>');
  }
</script>
</body>
</html>
